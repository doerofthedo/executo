<!doctype html>
<html lang="lv">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Executo</title>
        <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    </head>
    <body>
        <div id="app"></div>
        <script type="module">
            import '/src/entries/shared.ts';

            const authPaths = new Set([
                '/login',
                '/register',
                '/forgot-password',
                '/reset-password',
            ]);

            const entry = authPaths.has(window.location.pathname)
                ? '/src/entries/login.ts'
                : '/src/entries/app.ts';

            await import(entry);
        </script>
    </body>
</html>
