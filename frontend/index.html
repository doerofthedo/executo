<!doctype html>
<html lang="lv">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Executo</title>
        <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    </head>
    <body>
        <div id="app"></div>
        <script type="module">
            const authPaths = new Set([
                '/login',
                '/register',
                '/forgot-password',
                '/reset-password',
            ]);

            if (authPaths.has(window.location.pathname)) {
                await import('/src/entries/login.ts');
            } else {
                await import('/src/entries/app.ts');
            }
        </script>
    </body>
</html>
